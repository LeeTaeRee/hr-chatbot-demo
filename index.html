<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HR 챗봇</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="app-container">
    <header class="app-header">
      <div class="header-content">
        <div class="brand-panel">
          <div class="brand-mark">HR</div>
          <div class="brand-copy">
            <strong class="brand-title">HR 챗봇</strong>
            <p class="brand-subtitle">표준 취업규칙 기반 인사 문의 안내</p>
            <p class="brand-description">연차, 휴가, 퇴직금, 괴롭힘 신고, 전자결재, 경조휴가, 교육신청 등 실제 업무에 바로 적용 가능한 절차를 제공합니다.</p>
          </div>
        </div>
        <button class="btn-new-chat" id="newConversationBtn">새 대화</button>
      </div>
    </header>

    <main class="app-main">
      <aside class="sidebar">
        <div class="sidebar-section faq-section">
          <div class="sidebar-title">자주 묻는 질문</div>
          <div class="faq-grid">
            <button class="faq-btn" data-question="연차는 몇 개 발생하나요?">
              <span>연차는 몇 개 발생하나요?</span>
            </button>
            <button class="faq-btn" data-question="퇴직금은 어떻게 계산되나요?">
              <span>퇴직금은 어떻게 계산되나요?</span>
            </button>
            <button class="faq-btn" data-question="직장 내 괴롭힘 신고 절차는?">
              <span>직장 내 괴롭힘 신고 절차는?</span>
            </button>
            <button class="faq-btn" data-question="육아휴직 신청하려면 어떻게 하나요?">
              <span>육아휴직 신청하려면 어떻게 하나요?</span>
            </button>
            <button class="faq-btn" data-question="전자결재는 어떻게 하나요?">
              <span>전자결재는 어떻게 하나요?</span>
            </button>
            <button class="faq-btn" data-question="경조휴가 신청 절차는?">
              <span>경조휴가 신청 절차는?</span>
            </button>
          </div>
        </div>

        <div class="sidebar-section history-section">
          <div class="sidebar-title">최근 질문</div>
          <div class="history-list" id="historyList">
            <p class="history-empty">최근 질문이 없습니다</p>
          </div>
        </div>
      </aside>

      <section class="chat-section">
        <div class="chat-container">
          <div class="chat-window" id="chatWindow">
            <div class="chat-history" id="chatHistory">
              <div class="empty-state" id="emptyState">
                <p>질문을 입력하거나 FAQ를 선택해 시작하세요.</p>
              </div>
            </div>
          </div>

          <div class="input-section">
            <div class="input-wrapper">
              <textarea id="userInput" placeholder="질문을 입력하세요..." rows="2"></textarea>
              <button class="btn-send" id="sendBtn">전송</button>
            </div>
          </div>
        </div>

        <div class="answer-panel">
          <div class="answer-header">
            <div>
              <h3>AI 답변</h3>
              <p class="answer-tip">단계별 절차, 준비 서류, 담당 부서까지 한 번에 확인하세요.</p>
            </div>
          </div>
          <div class="answer-content" id="aiAnswer">
            <div class="answer-card empty-card" id="emptyAnswerCard">
              <p>질문을 입력하거나 FAQ를 선택하면 표준 취업규칙 기반 답변이 카드 형태로 표시됩니다.</p>
            </div>
          </div>
        </div>
      </section>
    </main>
  </div>

  <script src="script.js"></script>
</body>
</html>
